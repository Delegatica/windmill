name: build-delegatica-image

# Patched Windmill (CE limits lifted) → GHCR. Built with features=ce to match the
# official CE image (static_frontend/UI + mcp + all CE features).
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/delegatica/windmill
  TAG: v1.713.1-delegatica

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h /
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            features=static_frontend,mcp
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
